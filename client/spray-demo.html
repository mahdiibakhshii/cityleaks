<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CityLeaks · Spray text demo</title>
    <!-- Pull in the @font-face declarations (Seikora / DesimateStonger) for fill style. -->
    <link rel="stylesheet" href="/src/styles/main.css" />
    <style>
      body {
        margin: 0;
        background: #2a2a2a;
        color: #ddd;
        font-family: system-ui, sans-serif;
        padding: 16px;
      }
      h1 { font-size: 16px; font-weight: 600; margin: 0 0 12px; }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
        align-items: center;
        margin-bottom: 16px;
        background: #1c1c1c;
        padding: 12px;
        border-radius: 8px;
      }
      .controls label { font-size: 12px; display: flex; gap: 6px; align-items: center; }
      .controls input[type='range'] { width: 120px; }
      .controls input[type='text'] { width: 320px; padding: 4px 8px; }
      button {
        background: #3b6; color: #042; border: 0; border-radius: 6px;
        padding: 6px 12px; font-weight: 600; cursor: pointer;
      }
      .grid { display: flex; flex-wrap: wrap; gap: 18px; }
      .tile { background: #1c1c1c; border-radius: 8px; padding: 10px; }
      .tile .cap { font-size: 11px; color: #999; margin-bottom: 6px; }
      canvas { background: #fff; border-radius: 4px; display: block; box-shadow: 0 2px 8px #0008; }
      .wallwrap canvas { background: none; }
    </style>
  </head>
  <body>
    <h1>Spray text — tag vs fill comparison (dev demo)</h1>
    <div class="controls">
      <label>Text <input id="text" type="text" value="Stick around" /></label>
      <label title="Replace specific letters with another face, e.g. s:futural p:scripts">
        swap letters <input id="overrides" type="text" placeholder="s:futural p:scripts" value="" />
      </label>
      <label>density <input id="density" type="range" min="0.3" max="3" step="0.05" value="3" /></label>
      <label>scatter <input id="scatter" type="range" min="0" max="6" step="0.1" value="0.9" /></label>
      <label>halo <input id="halo" type="range" min="0" max="0.5" step="0.01" value="0.22" /></label>
      <label>wobble <input id="wobble" type="range" min="0" max="5" step="0.1" value="2" /></label>
      <label>roughness <input id="roughness" type="range" min="0" max="1.5" step="0.05" value="0.6" /></label>
      <label>slant <input id="slantVar" type="range" min="0" max="0.8" step="0.02" value="0" /></label>
      <label>stretch <input id="stretch" type="range" min="0" max="0.8" step="0.02" value="0.32" /></label>
      <label>jitter <input id="jitter" type="range" min="0" max="1" step="0.05" value="0.2" /></label>
      <label>letter sp. <input id="tracking" type="range" min="-3" max="20" step="0.5" value="8" /></label>
      <label>line sp. <input id="lineSpacing" type="range" min="0.8" max="2.5" step="0.05" value="0.8" /></label>
      <label>fade <input id="fadeAmount" type="range" min="0" max="1" step="0.05" value="0.5" /></label>
      <label>fade mode
        <select id="fade">
          <option value="patchy">patchy</option>
          <option value="tail">tail</option>
          <option value="global" selected>global</option>
          <option value="none">none</option>
        </select>
      </label>
      <label>pressure <input id="pressure" type="range" min="0" max="1" step="0.05" value="0.05" /></label>
      <label>taper <input id="taper" type="range" min="0" max="1" step="0.05" value="0.35" /></label>
      <label>bleed <input id="bleed" type="range" min="0" max="1" step="0.05" value="0.3" /></label>
      <label>drips <input id="drips" type="range" min="0" max="1" step="0.05" value="0.25" /></label>
      <label>drip len <input id="dripLength" type="range" min="0" max="4" step="0.1" value="0.9" /></label>
      <label>grain <input id="grain" type="range" min="0" max="1" step="0.05" value="0.35" /></label>
      <button id="reseed">🎲 New seed</button>
    </div>
    <div id="grid" class="grid"></div>
    <script type="module" src="/src/admin/sprayDemo.ts"></script>
  </body>
</html>
