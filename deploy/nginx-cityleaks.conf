# CityLeaks reverse proxy: public port 80 -> Node/Socket.IO on 127.0.0.1:3000.
# certbot adds the TLS (:443) server block + HTTP->HTTPS redirect in-place when
# run with --nginx (see deploy/README.md). Domain: cityleaks.space.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name cityleaks.space www.cityleaks.space;

    # Allow large WebSocket frames and the 125 KB grid:full payload.
    client_max_body_size 5m;

    # Socket.IO endpoint — needs the HTTP/1.1 Upgrade handshake for WebSockets.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep idle WebSocket connections alive (players standing still).
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Everything else: static client (index.html, monitor.html, tiles) + API.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
